services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: kyc-gateway:latest
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      GATEWAY_PORT: 8000
      GATEWAY_OCR_UPSTREAM: http://ocr:8000
      GATEWAY_API_KEY: "${GATEWAY_API_KEY:-}"
      GATEWAY_MAX_ACTIVE: "${GATEWAY_MAX_ACTIVE:-${OCR_WORKERS:-1}}"
      GATEWAY_MAX_QUEUE: "${GATEWAY_MAX_QUEUE:-4}"
      GATEWAY_UPSTREAM_TIMEOUT_SECONDS: "${GATEWAY_UPSTREAM_TIMEOUT_SECONDS:-90}"
      GATEWAY_DEFAULT_ACCURACY_MODE: "${GATEWAY_DEFAULT_ACCURACY_MODE:-fast}"
      GATEWAY_DEFAULT_RETRY: "${GATEWAY_DEFAULT_RETRY:-false}"
      GATEWAY_CONFIG_DIR: /app/config
      GATEWAY_DATA_DIR: /app/data
      GATEWAY_BACKUP_DIR: /app/.gateway_backups
      OCR_MAX_FILE_MB: "${OCR_MAX_FILE_MB:-15}"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - gateway-backups:/app/.gateway_backups
    depends_on:
      ocr:
        condition: service_healthy
    restart: unless-stopped

  ocr:
    build: .
    image: kyc-ocr:latest
    expose:
      - "8000"
    environment:
      OCR_HOST: 0.0.0.0
      OCR_PORT: 8000
      OCR_WORKERS: "${OCR_WORKERS:-1}"
      OCR_LOG_LEVEL: "${OCR_LOG_LEVEL:-info}"
      OCR_KEEP_ALIVE: "${OCR_KEEP_ALIVE:-15}"
      OCR_CACHE_DIR: /app/.ocr_cache
      OCR_MAX_FILE_MB: "${OCR_MAX_FILE_MB:-15}"
      OCR_DEVICE: "${OCR_DEVICE:-cpu}"
      OCR_GPU_ID: "${OCR_GPU_ID:-0}"
      OCR_USE_GPU: "${OCR_USE_GPU:-false}"
    volumes:
      - ocr-cache:/app/.ocr_cache
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  ocr-cache:
  gateway-backups:
