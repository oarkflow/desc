document_type: nepali_citizenship_old_front
detect:
  cues:
  - text: नेपाली नागरिकताको प्रमाणपत्र
  - text: ना.प्र.नं
  - text: नाप्र
  - text: जिल्ला प्रशासन कार्यालय
  min_score: 1
ocr:
  timeout_seconds: 10
  max_passes: 4
  max_image_side: 1400
  passes:
  - name: nepali
    lang: ne
    script: devanagari
    source_kind: printed
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    preprocessing:
      upscale: true
      enhance: true
      clean_background: false
      max_image_side: 1400
  - name: clean
    lang: ne
    script: devanagari
    source_kind: printed
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    preprocessing:
      upscale: true
      enhance: true
      clean_background: true
      max_image_side: 1400
  - name: nepali_handwritten_clean
    mode: retry_only
    lang: ne
    script: devanagari
    source_kind: handwritten
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.2
    retry_fields:
    - citizenship_number
    - full_name
    - date_of_birth
    run_if_below_confidence: 0.9
    preprocessing:
      upscale: true
      denoise: true
      enhance: true
      clean_background: true
  - name: nepali_handwritten_threshold
    mode: retry_only
    lang: ne
    script: devanagari
    source_kind: handwritten
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.2
    retry_fields:
    - citizenship_number
    - full_name
    - date_of_birth
    run_if_below_confidence: 0.85
    preprocessing:
      upscale: true
      denoise: true
      enhance: false
      clean_background: false
      threshold: true
fields:
  citizenship_number:
    labels:
    - ना.प्र.नं
    - ना. प्र. नं.
    - ना.प्र.नं.
    strategies:
    - same_line_after_label
    - same_row_right_of_label
    - regex_from_full_text
    regex: '[0-9०-९]{2}-[0-9०-९]{2}-[0-9०-९]{2}-[0-9०-९]{4,6}'
    normalizers:
    - nepali_digits_to_ascii
    - citizenship_number
  full_name:
    labels:
    - नाम थर
    - 'नाम थर:'
    strategies:
    - same_row_right_of_label
    normalizers:
    - clean_devanagari_name
    review_source_kinds:
    - handwritten
  date_of_birth:
    labels:
    - जन्म मिति
    - जन्ममिति
    strategies:
    - row_components
    - same_line_after_label
    components:
    - साल
    - महिना
    - गते
    normalizers:
    - nepali_digits_to_ascii
    - bs_date_components
  birth_place:
    labels:
    - जन्मस्थान
    - जन्म स्थान
    strategies:
    - anchor_region
    - same_row_right_of_label
    - gazetteer_match
    anchor_region:
    - 0.43
    - 0.38
    - 0.64
    - 0.53
    gazetteer: data/nepal_admin_areas.yaml
    gazetteer_hint_fields:
    - permanent_address
    review_source_kinds:
    - handwritten
  permanent_address:
    labels:
    - स्थायी वासस्थान
    - स्थायी ठेगाना
    strategies:
    - anchor_region
    - same_row_right_of_label
    - gazetteer_match
    anchor_region:
    - 0.43
    - 0.48
    - 0.66
    - 0.61
    gazetteer: data/nepal_admin_areas.yaml
    review_source_kinds:
    - handwritten
  father_name:
    labels:
    - बाबुको नाम थर
    - बाबुको नाम
    strategies:
    - same_row_right_of_label
    normalizers:
    - clean_devanagari_name
    review_source_kinds:
    - handwritten
  mother_name:
    labels:
    - आमाको नाम थर
    - आमाको नाम
    strategies:
    - same_row_right_of_label
    normalizers:
    - clean_devanagari_name
    review_source_kinds:
    - handwritten
