document_type: nepali_citizenship_mixed_language
detect:
  cues:
  - text: Citizenship Certificate
  - text: Full Name
  - text: VDC/Municipality
  min_score: 1
ocr:
  timeout_seconds: 10
  max_passes: 5
  max_image_side: 1600
  retry_padding_px: 24
  passes:
  - name: nepali
    lang: ne
    script: devanagari
    source_kind: printed
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    preprocessing:
      upscale: true
      enhance: true
      clean_background: false
      max_image_side: 1600
  - name: nepali_handwritten_clean
    mode: retry_only
    lang: ne
    script: devanagari
    source_kind: handwritten
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.2
    retry_fields:
    - citizenship_number
    - date_of_birth
    - full_name
    run_if_missing_fields:
    - citizenship_number
    - date_of_birth
    - full_name
    run_if_below_confidence: 0.99
    preprocessing:
      upscale: true
      denoise: true
      enhance: true
      clean_background: true
  - name: nepali_handwritten_threshold
    mode: retry_only
    lang: ne
    script: devanagari
    source_kind: handwritten
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.2
    retry_fields:
    - citizenship_number
    - date_of_birth
    - full_name
    run_if_missing_fields:
    - citizenship_number
    - date_of_birth
    - full_name
    run_if_below_confidence: 0.9
    preprocessing:
      upscale: true
      denoise: true
      enhance: false
      clean_background: false
      threshold: true
  - name: english
    lang: en
    source_kind: printed
    preprocessing:
      upscale: true
      enhance: true
      clean_background: false
      max_image_side: 1600
fields:
  citizenship_number:
    labels:
    - Citizenship Certificate No
    - Citizenship Certificafte No
    - CitizenshipCertificlte No
    - ना.प्र.नं
    strategies:
    - same_line_after_label
    - regex_from_full_text
    regex: \d{5,6}-\d{3,6}
    normalizers:
    - nepali_digits_to_ascii
    - citizenship_number
    retry_region:
    - 0.03
    - 0.545
    - 0.78
    - 0.595
    review_threshold: 0.65
    source_passes:
    - english
    - nepali
    - nepali_handwritten_clean
    - nepali_handwritten_threshold
    review_source_kinds:
    - handwritten
  gender:
    labels:
    - Sex
    strategies:
    - same_line_after_label
    - regex_from_full_text
    regex: \b[MF]\b
    source_passes:
    - english
  date_of_birth:
    labels:
    - Date Of Birth (AD)
    - Date Of Birth
    strategies:
    - row_components
    components:
    - Year
    - Month
    - Day
    normalizers:
    - nepali_digits_to_ascii
    - ad_date_components
    retry_region:
    - 0.03
    - 0.575
    - 0.96
    - 0.66
    review_threshold: 0.65
    source_passes:
    - english
    - nepali
    - nepali_handwritten_clean
    - nepali_handwritten_threshold
    review_source_kinds:
    - handwritten
  full_name:
    labels:
    - Full Name (in block)
    - Full Name
    strategies:
    - same_line_after_label
    - append_following_line
    - same_row_right_of_label
    review_threshold: 0.95
    retry_region:
    - 0.03
    - 0.575
    - 0.82
    - 0.625
    source_passes:
    - nepali
    - english
    - nepali_handwritten_clean
    - nepali_handwritten_threshold
    review_source_kinds:
    - handwritten
  birth_place:
    labels:
    - Birth Place (in block)
    - Birth Place
    - जन्मस्थान
    strategies:
    - same_line_after_label
    - anchor_region
    - gazetteer_match
    anchor_region:
    - 0.43
    - 0.635
    - 0.68
    - 0.69
    gazetteer: data/nepal_admin_areas.yaml
    review_threshold: 0.65
    source_passes:
    - english
    - nepali_handwritten_clean
    - nepali_handwritten_threshold
    review_source_kinds:
    - handwritten
  permanent_address:
    strategies:
    - template
    template: "{{permanent_district}} {{permanent_municipality}} {{permanent_ward}}"
  permanent_district:
    labels:
    - Permanent Address (in block)
    - Permanent Address
    - स्थायी वासस्थान
    strategies:
    - anchor_region
    - gazetteer_match
    anchor_region:
    - 0.67
    - 0.65
    - 0.93
    - 0.695
    gazetteer: data/nepal_admin_areas.yaml
    review_threshold: 0.65
    source_passes:
    - english
    - nepali_handwritten_clean
    - nepali_handwritten_threshold
    review_source_kinds:
    - handwritten
  permanent_municipality:
    labels:
    - VDC/Municipality/Sub/Metropolis
    strategies:
    - same_line_after_label
    - anchor_region
    anchor_region:
    - 0.48
    - 0.685
    - 0.78
    - 0.725
    review_threshold: 0.9
    source_passes:
    - english
    - nepali_handwritten_clean
    - nepali_handwritten_threshold
    review_source_kinds:
    - handwritten
  permanent_ward:
    labels:
    - Ward No
    strategies:
    - same_row_right_of_label
    - anchor_region
    anchor_region:
    - 0.88
    - 0.675
    - 0.98
    - 0.715
    source_passes:
    - english
