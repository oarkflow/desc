extraction_rules:
  digit_mappings:
    ०: '0'
    १: '1'
    २: '2'
    ३: '3'
    ४: '4'
    ५: '5'
    ६: '6'
    ७: '7'
    ८: '8'
    ९: '9'
  clean_separator_pattern: '[.।:|]+'
  normalize_separator_pattern: '[\s.।:|,/\\\-–—]+'
  trim_leading_pattern: ^[\-–—,;ः]+
  trim_trailing_pattern: '[\-–—,;]+$'
  token_strip_chars: '।.,;:-_ '
  label_only_values:
  - नाम
  - नामपर
  - नामथर
  - ठेगाना
  - जिल्ला
  - नागरिकता
  - प्रमाणपत्र
  - प्रमाणापत्र
  - किसिम
  - मिति
  - पर
  - परछ
  - यर
  - थर
  - ः
  - (in block)
  - District
  - Year
  - Month
  - Day
  - Ward No
  label_fragments:
  - नाम
  - ठेगाना
  - नागरिकता
  - प्रमाण
  - जिल्ला
  - मिति
  - किसिम
  strip_prefix_pattern: ^(परछ?|यर|थर|नं|न|ै)\s*
  split_before_patterns:
    permanent_address:
    - \s+नागरिकता\s+
    father_name:
    - \s+नागरिकता\s+
    mother_name:
    - \s+नागरिकता\s+
    permanent_municipality:
    - \s+OCH\b
  compact_remove_tokens:
  - साल
  - महिना
  - गते
  insignificant_tokens:
  - की
  - को
  - का
  - दा
  - ना
  - नाम
  date_component_pattern: साल\s*[:\-]?\s*(\d{3,4})\D+महिना\s*[:\-]?\s*(\d{1,2})\D+गते\s*[:\-]?\s*(\d{1,2})
  digit_shape_replacements: {}
  digit_shape_replacements_by_role:
    year:
      H: '45'
      A: '1'
      I: '1'
      i: '1'
      l: '1'
      g: '9'
    month:
      q: '1'
      r: '2'
    day:
      र: '2'
      न: '8'
      ल: ''
  digit_shape_token_patterns_by_role:
    month: ^[qr]+$
    day: ^[रनल]+$
  citizenship_label_fragments:
  - नाम
  - ठेगाना
  - नागरिकता
  - प्रमाण
  - जिल्ला
  - मिति
  - किसिम
  - स्थान
  - जन्म
  citizenship_digit_confusions:
    '3':
    - '1'
    '5':
    - '1'
  infer_patterns:
    citizenship_number: \b\d{4,}[\d/\\\-]*\b
    issue_date: \b\d{3,4}[./\-]\d{1,2}[./\-]\d{1,2}\b
document_type_dir: document_types
document_type_files: []
