document_type: generic_devanagari_document
detect:
  cues: []
  min_score: 1
tamper:
  rule_weights:
    field_regex_failed: 0.12
    field_validator_failed: 0.12
    low_image_sharpness: 0.08
    jpeg_recompression_anomaly: 0.16
    noise_inconsistency: 0.18
  review_threshold: 0.4
  reject_threshold: 0.75
ocr:
  timeout_seconds: 8
  max_passes: 3
  max_image_side: 1400
  passes:
  - name: devanagari_default
    lang: ne
    script: devanagari
    source_kind: printed
    text_detection_model: PP-OCRv5_mobile_det
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.25
    preprocessing:
      upscale: true
      enhance: true
      clean_background: false
      max_image_side: 1400
  - name: devanagari_clean
    lang: ne
    script: devanagari
    source_kind: printed
    text_detection_model: PP-OCRv5_mobile_det
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.25
    preprocessing:
      upscale: true
      enhance: true
      clean_background: true
      max_image_side: 1400
  - name: devanagari_threshold
    lang: ne
    script: devanagari
    source_kind: printed
    text_detection_model: PP-OCRv5_mobile_det
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.25
    preprocessing:
      upscale: true
      enhance: false
      clean_background: false
      threshold: true
      max_image_side: 1400
  - name: devanagari_handwritten_clean
    mode: retry_only
    lang: ne
    script: devanagari
    source_kind: handwritten
    text_detection_model: PP-OCRv5_mobile_det
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.2
    preprocessing:
      upscale: true
      denoise: true
      enhance: true
      clean_background: true
  - name: devanagari_handwritten_threshold
    mode: retry_only
    lang: ne
    script: devanagari
    source_kind: handwritten
    text_detection_model: PP-OCRv5_mobile_det
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    min_confidence: 0.2
    preprocessing:
      upscale: true
      denoise: true
      enhance: false
      clean_background: false
      threshold: true
fields: {}
