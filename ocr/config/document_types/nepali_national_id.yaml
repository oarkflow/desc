document_type: nepali_national_id
detect:
  cues:
  - text: NATIONAL IDENTITY CARD
  - text: Government of Nepal
  - text: राष्ट्रिय परिचयपत्र
  min_score: 1
tamper:
  required_fields:
  - nid_number
  - full_name
  - date_of_birth
  - issue_date
  field_regions:
    surname:
    - 0.27
    - 0.27
    - 0.5
    - 0.34
    given_name:
    - 0.27
    - 0.48
    - 0.54
    - 0.55
    nationality:
    - 0.03
    - 0.22
    - 0.18
    - 0.28
  expected_objects:
  - label: face
    required: true
    min_confidence: 0.5
  rule_weights:
    missing_required_field: 0.18
    field_regex_failed: 0.18
    field_validator_failed: 0.18
    date_consistency_failed: 0.35
    layout_region_mismatch: 0.2
    expected_object_missing: 0.3
    noise_inconsistency: 0.22
    pasted_region_edge_anomaly: 0.24
  review_threshold: 0.35
  reject_threshold: 0.7
ocr:
  timeout_seconds: 8
  max_passes: 3
  max_image_side: 1400
  passes:
  - name: nepali
    lang: ne
    script: devanagari
    source_kind: printed
    text_recognition_model: devanagari_PP-OCRv5_mobile_rec
    preprocessing:
      upscale: true
      enhance: true
      clean_background: false
      max_image_side: 1400
  - name: english
    lang: en
    source_kind: printed
    preprocessing:
      upscale: true
      enhance: true
      clean_background: false
      max_image_side: 1400
fields:
  nid_number:
    labels:
    - परिचयपत्र नम्बर
    - ID No
    - IDNO
    strategies:
    - regex_from_full_text
    - same_line_after_label
    regex: '[0-9०-९]{3}-[0-9०-९]{3}-[0-9०-९]{4}'
    normalizers:
    - nepali_digits_to_ascii
  full_name:
    strategies:
    - template
    template: '{{given_name}} {{surname}}'
  name_en:
    strategies:
    - template
    template: '{{given_name}} {{surname}}'
  surname:
    labels:
    - SURNAME
    strategies:
    - anchor_region
    anchor_region:
    - 0.27
    - 0.27
    - 0.5
    - 0.34
    source_passes:
    - english
    - nepali
  given_name:
    labels:
    - GIVEN NAME
    strategies:
    - anchor_region
    anchor_region:
    - 0.27
    - 0.48
    - 0.54
    - 0.55
    source_passes:
    - english
    - nepali
  date_of_birth:
    labels:
    - DATE OF BIRTH
    - जन्म मिति
    strategies:
    - regex_from_full_text
    - same_row_right_of_label
    regex: \b[0-9०-९]{4}[./\-](?:0?[1-9]|1[0-2])[./\-](?:0?[1-9]|[12][0-9]|3[01])\b
    normalizers:
    - nepali_digits_to_ascii
  issue_date:
    labels:
    - DATE OF ISSUE
    - जारी मिति
    strategies:
    - regex_from_full_text
    - same_row_right_of_label
    regex: \b[0-9]{2}-[0-9]{2}-[0-9]{4}\b
  gender:
    labels:
    - SEX
    - लिङ्ग
    strategies:
    - same_row_right_of_label
    - regex_from_full_text
    regex: \b[MF]\b
  nationality:
    labels:
    - NATIONALITY
    - राष्ट्रियता
    strategies:
    - anchor_region
    - same_row_right_of_label
    - below_label
    anchor_region:
    - 0.03
    - 0.22
    - 0.18
    - 0.28
    source_passes:
    - english
    - nepali
