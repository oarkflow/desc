<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KYC OCR Admin</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body data-api-key-configured="{{.APIKeyConfigured}}">
  <header class="topbar">
    <div>
      <h1>KYC OCR Admin</h1>
      <p>Document types, OCR settings, data files, and preview runs</p>
    </div>
    <label class="keybox">
      <span>API key</span>
      <input id="apiKey" type="password" autocomplete="off" placeholder="X-API-Key">
    </label>
  </header>

  <main class="shell">
    <nav class="tabs" aria-label="Admin sections">
      <button class="tab is-active" data-view="documentTypes">Document types</button>
      <button class="tab" data-view="profiles">OCR settings</button>
      <button class="tab" data-view="dataFiles">Data</button>
      <button class="tab" data-view="preview">Preview</button>
    </nav>

    <section id="notice" class="notice" hidden></section>

    <section id="documentTypes" class="view is-active">
      <div class="split">
        <aside class="panel list-panel">
          <div class="panel-head">
            <h2>Types</h2>
            <button id="newType" class="button">New</button>
          </div>
          <div id="typeList" class="list"></div>
        </aside>
        <section class="panel editor-panel">
          <div class="panel-head">
            <div>
              <h2 id="typeTitle">Select a document type</h2>
              <p id="typeMeta" class="muted"></p>
            </div>
            <div class="actions">
              <button id="duplicateType" class="button" disabled>Duplicate</button>
              <button id="deleteType" class="button danger" disabled>Delete</button>
              <button id="saveType" class="button primary" disabled>Save</button>
            </div>
          </div>
          <div id="documentForm" class="document-form"></div>
          <details class="yaml-details">
            <summary>Generated YAML</summary>
            <textarea id="typeYaml" spellcheck="false" readonly></textarea>
          </details>
        </section>
      </div>
    </section>

    <section id="profiles" class="view">
      <section class="panel">
        <div class="panel-head">
          <div><h2>Global OCR settings</h2><p class="muted">Edit document_profiles.yaml, including extraction rules.</p></div>
          <button id="saveProfiles" class="button primary">Save</button>
        </div>
        <textarea id="profilesYaml" class="large-code" spellcheck="false"></textarea>
      </section>
    </section>

    <section id="dataFiles" class="view">
      <div class="split">
        <aside class="panel list-panel">
          <div class="panel-head"><h2>Data files</h2></div>
          <div id="dataList" class="list"></div>
        </aside>
        <section class="panel editor-panel">
          <div class="panel-head">
            <div><h2 id="dataTitle">Select a data file</h2><p id="dataMeta" class="muted"></p></div>
            <button id="saveData" class="button primary" disabled>Save</button>
          </div>
          <textarea id="dataContent" class="large-code" spellcheck="false"></textarea>
        </section>
      </div>
    </section>

    <section id="preview" class="view">
      <section class="panel">
        <div class="panel-head"><h2>Upload preview</h2><button id="runPreview" class="button primary">Run OCR</button></div>
        <form id="previewForm" class="preview-form">
          <input id="previewFile" name="file" type="file" accept="image/*" required>
          <label>Document type<select id="previewDocumentType" name="document_type"></select></label>
          <label>Accuracy<select name="accuracy_mode"><option value="fast">fast</option><option value="accurate">accurate</option></select></label>
          <label class="check"><input name="retry" type="checkbox" value="true"> Retry</label>
          <label class="check"><input name="values_only" type="checkbox" value="true" checked> Values only</label>
          <label class="check"><input name="include_stats" type="checkbox" value="true"> Stats</label>
        </form>
      </section>
      <div class="preview-grid">
        <section class="panel">
          <h2>Image overlay</h2>
          <div class="canvas-wrap"><img id="previewImage" alt=""><canvas id="previewCanvas"></canvas></div>
        </section>
        <section class="panel">
          <h2>OCR result</h2>
          <pre id="previewResult" class="result-box"></pre>
        </section>
      </div>
    </section>
  </main>
  <script src="/admin/static/admin.js"></script>
</body>
</html>
