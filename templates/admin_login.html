<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f5f7f8;
            color: #172026;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        form {
            width: min(420px, calc(100vw - 32px));
            background: #fff;
            border: 1px solid #d9e1e5;
            border-radius: 8px;
            padding: 24px;
        }

        input,
        button {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
            border-radius: 6px;
            padding: 11px 12px;
        }

        input {
            border: 1px solid #bdc9cf;
            margin: 8px 0 14px;
        }

        button {
            border: 0;
            background: #0f766e;
            color: #fff;
            font-weight: 700;
        }

        .error {
            color: #b91c1c;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <form method="post">
        <h1>Admin Login</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <label for="email">Email</label>
        <input id="email" name="email" type="email" value="admin@example.com" required autofocus />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
        <button type="submit">Sign In</button>
    </form>
</body>

</html>
