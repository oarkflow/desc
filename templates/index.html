<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Blink Detection</title>
    <script>
        let video;
        let canvas;
        let context;

        async function startWebcam() {
            video = document.getElementById('webcam');
            canvas = document.getElementById('canvas');
            context = canvas.getContext('2d');

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.play();

            setInterval(captureFrame, 100);
        }

        async function captureFrame() {
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const frame = canvas.toDataURL('image/jpeg');

            const response = await fetch('/process_frame', {
                method: 'POST',
                body: frame,
                headers: {
                    'Content-Type': 'application/octet-stream'
                }
            });

            const result = await response.json();
            console.log(result);
        }

        async function startDetection() {
            const response = await fetch('/start_detection', {
                method: 'GET'
            });

            const result = await response.json();
            document.getElementById('result').innerText = JSON.stringify(result, null, 2);
        }

        window.onload = startWebcam;
    </script>
</head>

<body>
    <h1>Webcam Blink Detection</h1>
    <button onclick="startDetection()">Start Detection</button>
    <pre id="result" style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc;"></pre>
    <video id="webcam" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
</body>

</html>
